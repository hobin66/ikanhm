name: Generate Signing Key (Manual)

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check Existing Signing Secret
        id: guard
        shell: bash
        env:
          KEY_STORE_FILE: ${{ secrets.KEY_STORE_FILE }}
        run: |
          if [ -n "${KEY_STORE_FILE}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Signing secret already exists. Skip key generation."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "No signing secret found. Will generate a new key bundle."
          fi

      - name: Set up JDK
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Generate Keystore And Secret Bundle
        if: steps.guard.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          KS_ALIAS="ikanhm"
          KS_PASS="$(python3 -c 'import secrets,string; a=string.ascii_letters+string.digits; print("".join(secrets.choice(a) for _ in range(24)))')"
          KEY_PASS="$(python3 -c 'import secrets,string; a=string.ascii_letters+string.digits; print("".join(secrets.choice(a) for _ in range(24)))')"

          keytool -genkeypair -v \
            -keystore signingkey.jks \
            -alias "${KS_ALIAS}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${KS_PASS}" \
            -keypass "${KEY_PASS}" \
            -dname "CN=ikanhm, O=ikanhm, C=CN" \
            -noprompt

          base64 -w 0 signingkey.jks > signingkey.jks.base64

          FINGERPRINT=$(keytool -list -v \
            -keystore signingkey.jks \
            -alias "${KS_ALIAS}" \
            -storepass "${KS_PASS}" \
            2>/dev/null | grep "SHA256:" | head -1 | sed 's/.*SHA256: //' | tr -d ':' | tr '[:upper:]' '[:lower:]')

          {
            echo "KEY_STORE_FILE=$(cat signingkey.jks.base64)"
            echo "KEY_STORE_PASSWORD=${KS_PASS}"
            echo "ALIAS=${KS_ALIAS}"
            echo "KEY_PASSWORD=${KEY_PASS}"
            echo "SIGNING_KEY_FINGERPRINT=${FINGERPRINT}"
          } > github_secrets.txt

      - name: Upload Signing Bundle
        if: steps.guard.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: signing-key-bundle
          path: |
            signingkey.jks
            signingkey.jks.base64
            github_secrets.txt
          retention-days: 1
