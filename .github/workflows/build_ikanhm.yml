name: Build and Publish Plugin Repo

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Extension
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew

      - name: Generate or Restore Signing Keystore
        run: |
          if [ -n "${{ secrets.KEY_STORE_FILE }}" ]; then
            echo "Using keystore from secrets..."
            echo "${{ secrets.KEY_STORE_FILE }}" | base64 -d > signingkey.jks
            KS_PASS="${{ secrets.KEY_STORE_PASSWORD }}"
            KS_ALIAS="${{ secrets.ALIAS }}"
            echo "KEY_STORE_PASSWORD=${KS_PASS}" >> $GITHUB_ENV
            echo "ALIAS=${KS_ALIAS}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          else
            echo "No keystore secret found, generating a new self-signed keystore..."
            KS_PASS="ikanhm123"
            KS_ALIAS="ikanhm"
            keytool -genkey -v \
              -keystore signingkey.jks \
              -alias "${KS_ALIAS}" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass "${KS_PASS}" \
              -keypass "${KS_PASS}" \
              -dname "CN=ikanhm, O=ikanhm, C=CN" \
              -noprompt
            echo "KEY_STORE_PASSWORD=${KS_PASS}" >> $GITHUB_ENV
            echo "ALIAS=${KS_ALIAS}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${KS_PASS}" >> $GITHUB_ENV
          fi

          # Extract the SHA-256 fingerprint of the signing cert (required by Mihon's repo.json)
          FINGERPRINT=$(keytool -list -v \
            -keystore signingkey.jks \
            -alias "${KS_ALIAS}" \
            -storepass "${KS_PASS}" \
            2>/dev/null | grep "SHA256:" | head -1 | sed 's/.*SHA256: //' | tr -d ':' | tr '[:upper:]' '[:lower:]')
          echo "SIGNING_FINGERPRINT=${FINGERPRINT}" >> $GITHUB_ENV
          echo "Signing fingerprint: ${FINGERPRINT}"

      - name: Build IKANHM Extension APK
        uses: gradle/gradle-build-action@v2
        with:
          arguments: :src:zh:ikanhm:assembleRelease -x spotlessCheck
        env:
          KEY_STORE_PASSWORD: ${{ env.KEY_STORE_PASSWORD }}
          ALIAS: ${{ env.ALIAS }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}

      - name: Create Repo Output
        run: |
          mkdir -p repo/apk
          # Copy the release APK and strip the "-release" suffix from filename
          for apk in src/zh/ikanhm/build/outputs/apk/release/*.apk; do
            dest_name=$(basename "$apk" | sed 's/-release\.apk$/.apk/')
            cp "$apk" "repo/apk/$dest_name"
          done

          # Download Keiyoushi Inspector to generate output.json
          INSPECTOR_LINK="$(curl -s "https://api.github.com/repos/keiyoushi/extensions-inspector/releases/latest" | jq -r '.assets[0].browser_download_url')"
          curl -L "$INSPECTOR_LINK" -o ./Inspector.jar
          java -jar ./Inspector.jar "repo/apk" "output.json" "tmp"

          # Run the python script to construct index.min.json and extract icons
          python3 ./.github/scripts/create-repo.py

          # Generate repo.json — required by Mihon to validate the repository
          cat > repo/repo.json << EOF
{
  "meta": {
    "name": "漫小肆韩漫 (Ikanhm)",
    "website": "https://github.com/hobin66/ikanhm",
    "signingKeyFingerprint": "${SIGNING_FINGERPRINT}"
  }
}
EOF
          echo "Generated repo.json with fingerprint: ${SIGNING_FINGERPRINT}"
          cat repo/repo.json

      - name: Deploy to repo branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          publish_branch: repo
          force_orphan: true
