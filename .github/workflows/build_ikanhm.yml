name: Build and Publish Plugin Repo

on:
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build:
    name: Build Extension
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew

      - name: Restore Signing Keystore
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.KEY_STORE_FILE }}" ] || \
             [ -z "${{ secrets.KEY_STORE_PASSWORD }}" ] || \
             [ -z "${{ secrets.ALIAS }}" ] || \
             [ -z "${{ secrets.KEY_PASSWORD }}" ]; then
            echo "Missing signing secrets. Please set KEY_STORE_FILE, KEY_STORE_PASSWORD, ALIAS, KEY_PASSWORD."
            exit 1
          fi

          echo "Using keystore from secrets..."
          printf '%s' "${{ secrets.KEY_STORE_FILE }}" | base64 -d > signingkey.jks
          if [ ! -s signingkey.jks ]; then
            echo "::error::Decoded signingkey.jks is empty. Please re-check KEY_STORE_FILE."
            exit 1
          fi

          KS_PASS="${{ secrets.KEY_STORE_PASSWORD }}"
          KS_ALIAS="${{ secrets.ALIAS }}"
          KEY_PASS="${{ secrets.KEY_PASSWORD }}"

          if ! keytool -list -v \
            -keystore signingkey.jks \
            -alias "${KS_ALIAS}" \
            -storepass "${KS_PASS}" \
            >/dev/null 2>&1; then
            echo "::error::Cannot open signingkey.jks with KEY_STORE_PASSWORD + ALIAS. Please verify KEY_STORE_FILE / KEY_STORE_PASSWORD / ALIAS."
            exit 1
          fi

          check_key_password() {
            local pass="$1"
            keytool -importkeystore \
              -srckeystore signingkey.jks \
              -srcalias "${KS_ALIAS}" \
              -srcstorepass "${KS_PASS}" \
              -srckeypass "${pass}" \
              -destkeystore /tmp/signingkey-check.p12 \
              -deststoretype PKCS12 \
              -deststorepass "tmpCheckPass123" \
              -destkeypass "tmpCheckPass123" \
              -noprompt \
              >/dev/null 2>&1
          }

          rm -f /tmp/signingkey-check.p12
          if ! check_key_password "${KEY_PASS}"; then
            echo "Provided KEY_PASSWORD cannot decrypt private key. Trying KEY_STORE_PASSWORD as fallback..."
            rm -f /tmp/signingkey-check.p12
            if check_key_password "${KS_PASS}"; then
              KEY_PASS="${KS_PASS}"
              echo "Fallback succeeded. Using KEY_STORE_PASSWORD as KEY_PASSWORD."
            else
              echo "::error::Invalid KEY_PASSWORD (fallback with KEY_STORE_PASSWORD also failed). Please re-generate the signing bundle and update secrets."
              exit 1
            fi
          fi
          rm -f /tmp/signingkey-check.p12

          echo "KEY_STORE_PASSWORD=${KS_PASS}" >> $GITHUB_ENV
          echo "ALIAS=${KS_ALIAS}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${KEY_PASS}" >> $GITHUB_ENV

          # Extract the SHA-256 fingerprint of the signing cert (required by Mihon's repo.json)
          FINGERPRINT=$(keytool -list -v \
            -keystore signingkey.jks \
            -alias "${KS_ALIAS}" \
            -storepass "${KS_PASS}" \
            2>/dev/null | grep "SHA256:" | head -1 | sed 's/.*SHA256: //' | tr -d ':' | tr '[:upper:]' '[:lower:]')
          echo "SIGNING_FINGERPRINT=${FINGERPRINT}" >> $GITHUB_ENV
          echo "Signing fingerprint: ${FINGERPRINT}"

      - name: Build Extensions APK
        uses: gradle/gradle-build-action@v2
        with:
          arguments: :src:zh:ikanhm:assembleRelease :src:zh:se8:assembleRelease :src:zh:ozv:assembleRelease -x spotlessCheck
        env:
          KEY_STORE_PASSWORD: ${{ env.KEY_STORE_PASSWORD }}
          ALIAS: ${{ env.ALIAS }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}

      - name: Create Repo Output
        run: |
          mkdir -p repo/apk
          # Copy all zh extension release APKs and strip the "-release" suffix
          shopt -s nullglob
          apks=(src/zh/*/build/outputs/apk/release/*.apk)
          if [ ${#apks[@]} -eq 0 ]; then
            echo "No APK artifacts were found."
            exit 1
          fi
          for apk in "${apks[@]}"; do
            dest_name=$(basename "$apk" | sed 's/-release\.apk$/.apk/')
            cp "$apk" "repo/apk/$dest_name"
          done

          # Download Keiyoushi Inspector to generate output.json
          INSPECTOR_LINK="$(curl -s "https://api.github.com/repos/keiyoushi/extensions-inspector/releases/latest" | jq -r '.assets[0].browser_download_url')"
          curl -L "$INSPECTOR_LINK" -o ./Inspector.jar
          java -jar ./Inspector.jar "repo/apk" "output.json" "tmp"

          # Run the python script to construct index.min.json and extract icons
          python3 ./.github/scripts/create-repo.py

          # Generate repo.json — required by Mihon to validate the repository
          printf '{\n  "meta": {\n    "name": "ikanhm",\n    "website": "https://github.com/hobin66/ikanhm",\n    "signingKeyFingerprint": "%s"\n  }\n}\n' "${SIGNING_FINGERPRINT}" > repo/repo.json
          echo "Generated repo.json with fingerprint: ${SIGNING_FINGERPRINT}"
          cat repo/repo.json

      - name: Deploy to repo branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          publish_branch: repo
          force_orphan: true
