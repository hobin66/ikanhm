name: Build and Publish Plugin Repo

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Extension
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew

      - name: Build IKANHM Extension APK
        uses: gradle/gradle-build-action@v2
        with:
          arguments: :src:zh:ikanhm:assembleDebug -x spotlessCheck

      - name: Create Repo Output
        run: |
          mkdir -p repo/apk
          cp src/zh/ikanhm/build/outputs/apk/debug/*.apk repo/apk/
          
          # Download Keiyoushi Inspector to generate output.json
          INSPECTOR_LINK="$(curl -s "https://api.github.com/repos/keiyoushi/extensions-inspector/releases/latest" | jq -r '.assets[0].browser_download_url')"
          curl -L "$INSPECTOR_LINK" -o ./Inspector.jar
          java -jar ./Inspector.jar "repo/apk" "output.json" "tmp"
          
          # Run the template python script to construct the actual index.min.json and extract icons
          python ./.github/scripts/create-repo.py
          
          # Create an icon folder if required by Mihon
          mkdir -p repo/icon
          # Attempt to extract icon using unzip and aapt (Optional but Inspector handles some if configured, but let's just let it be)
          
      - name: Deploy to repo branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          publish_branch: repo
          force_orphan: true
